services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    image: bonapka-backend:local
    container_name: bonapka-app
    ports:
      - '5001:5000'
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - REDIS_ENABLED=false
      - REDIS_URL=redis://bonapka-redis:6379
      - REDIS_SOCKET=
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bonapka-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  redis-data:
